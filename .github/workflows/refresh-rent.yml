name: Refresh Rent

on:
  schedule:
    - cron: '0 18 1 * *' # 매월 1일 18:00 KST (= 09:00 UTC)
  workflow_dispatch:  # 운영자 수동 트리거 — feature 브랜치 dispatch 시 해당 브랜치에 데이터 commit. main 외 브랜치는 의도된 운영자만 사용 (AUTOMATION.md §8.1).

concurrency:
  group: data-refresh-rent-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

# rent-only fetcher + rent/food 통합형 fetcher 모두 호출. 통합형은 monthly 빈도가 적정 — 식료품
# 가격은 통합형 안에서 함께 갱신되며, 식료품 단독 fetcher (kr_kca/kr_kosis/ca_statcan/us_bls) 는
# refresh-prices.yml 에서 weekly 로 별도 갱신.

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      KR_DATA_API_KEY: ${{ secrets.KR_DATA_API_KEY }}
      US_CENSUS_API_KEY: ${{ secrets.US_CENSUS_API_KEY }}
      # JP_ESTAT_APP_ID / SG_DATA_GOV_KEY 는 v1.0 에서 사용 안 함 (jp_estat / sg_singstat 가
      # --useStatic 모드). v1.x 응답 단위 검증 도입 시 다시 wire up.
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Korea - MOLIT (Ministry of Land)
      - name: Skip kr_molit if API key absent
        if: env.KR_DATA_API_KEY == ''
        run: echo "::warning::KR_DATA_API_KEY not set, skipping kr_molit.mjs"

      - name: Refresh KR MOLIT
        if: env.KR_DATA_API_KEY != ''
        run: node scripts/refresh/_run.mjs kr_molit

      # Canada - CMHC (no key required)
      - name: Refresh CA CMHC
        run: node scripts/refresh/_run.mjs ca_cmhc

      # US - HUD (no key required)
      - name: Refresh US HUD
        run: node scripts/refresh/_run.mjs us_hud

      # US - Census
      - name: Skip us_census if API key absent
        if: env.US_CENSUS_API_KEY == ''
        run: echo "::warning::US_CENSUS_API_KEY not set, skipping us_census.mjs"

      - name: Refresh US Census
        if: env.US_CENSUS_API_KEY != ''
        run: node scripts/refresh/_run.mjs us_census

      # 통합형 fetcher (rent + food). 이전엔 prices.yml 에도 호출되어 중복 실행됐으나 분리.

      # UK - ONS (no key required)
      - name: Refresh UK ONS
        run: node scripts/refresh/_run.mjs uk_ons

      # Germany - Destatis (no key required)
      - name: Refresh DE Destatis
        run: node scripts/refresh/_run.mjs de_destatis

      # France - INSEE (no key required)
      - name: Refresh FR INSEE
        run: node scripts/refresh/_run.mjs fr_insee

      # Netherlands - CBS (no key required)
      - name: Refresh NL CBS
        run: node scripts/refresh/_run.mjs nl_cbs

      # Australia - ABS (no key required)
      - name: Refresh AU ABS
        run: node scripts/refresh/_run.mjs au_abs

      # Japan - e-Stat — v1.0 정책상 --useStatic 필수.
      # v1.0 의 jp_estat.mjs 는 응답 단위/스케일 (천엔 vs 엔, 도/현 vs 전국 평균) 검증이 미완이라
      # API 호출 결과를 STATIC 보정에 적용하지 않음 — 호출해도 어차피 STATIC 값 그대로 도시 JSON 에
      # 적재된다. 매 월 e-Stat API 에 무의미한 호출을 보낼 이유가 없어 v1.0 에서는 비활성화.
      # --useStatic 으로 API 키 없이도 동작하므로 conditional skip 불필요. v1.x 별도 phase 에서
      # 응답 단위 검증 + --useStatic 제거.
      - name: Refresh JP e-Stat (useStatic — v1.0)
        run: node scripts/refresh/_run.mjs jp_estat --useStatic

      # Singapore - SingStat — v1.0 정책상 --useStatic 필수 (PR #20 review round 13).
      # sg_singstat.mjs 의 fetchSingStatTable / apiAvailable 는 v1.0 에서 응답 단위 검증 미완으로
      # STATIC 보정에 wire up 되지 않아 항상 STATIC 반환. SingStat tablebuilder API 호출 + 키 노출
      # 위험을 차단하기 위해 jp_estat 와 동일 패턴으로 --useStatic 강제. v1.x 응답 단위 검증 후 제거.
      - name: Refresh SG SingStat (useStatic — v1.0)
        run: node scripts/refresh/_run.mjs sg_singstat --useStatic

      # Vietnam - GSO (rent + food + transport — static estimates)
      - name: Refresh VN GSO
        run: node scripts/refresh/_run.mjs vn_gso

      # UAE - FCSC (no key required)
      - name: Refresh AE FCSC
        run: node scripts/refresh/_run.mjs ae_fcsc

      - name: Build data
        run: node scripts/build_data.mjs

      - name: Validate cities
        run: node scripts/validate_cities.mjs

      - name: Detect outliers
        id: outliers
        run: node scripts/detect_outliers.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR for outliers
        if: steps.outliers.outputs.HAS_OUTLIERS == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: 'data: monthly rent refresh (outliers)'
          branch: auto/refresh-rent-outlier-${{ github.run_id }}
          title: 'data: monthly rent refresh — review needed'
          labels: outlier
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 임차료 갱신 중 이상 변동(≥30%) 감지.

            변경 내역을 검토해주세요.

      - name: Create PR for updates
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && (steps.outliers.outputs.HAS_UPDATES == 'true' || steps.outliers.outputs.HAS_NEW == 'true')
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: 'data: monthly rent refresh (auto-update)'
          branch: auto/refresh-rent-update-${{ github.run_id }}
          title: 'data: monthly rent refresh (5~30% 변동)'
          labels: auto-update
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 임차료 갱신 — 5~30% 변동. AUTOMATION.md §1 정책에 따라 PR 로 검토 후 머지.

      - name: Auto commit and push
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && steps.outliers.outputs.HAS_UPDATES != 'true' && steps.outliers.outputs.HAS_NEW != 'true'
        run: |
          git add data/cities/ data/all.json data/seed/all.json
          git diff --staged --quiet || git commit -m "data: monthly rent refresh"
          # push retry — 다른 카테고리 워크플로우와의 동시 push race 가 발생해도 다음 시도에서 rebase 후 성공.
          for attempt in 1 2 3; do
            # 이전 attempt 의 rebase 가 충돌로 in-progress 상태로 남아 있으면 다음 시도가 즉시 실패하므로 정리.
            git rebase --abort 2>/dev/null || true
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || echo "::warning::rebase attempt $attempt failed (continuing to push)"
            if git push; then exit 0; fi
            echo "::warning::push attempt $attempt failed; retrying..."
            sleep $((attempt * 5))
          done
          echo "::error::push failed after 3 attempts"
          exit 1
