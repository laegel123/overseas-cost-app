name: Refresh Tuition

on:
  schedule:
    - cron: '0 9 15 1,4,7,10 *' # 분기 첫 달 15일 09:00 UTC (= 18:00 KST). PR #20 review round 21 — 과거 '0 18'은 UTC 18:00 = 익일 03:00 KST 였음.
  workflow_dispatch:  # 운영자 수동 트리거 — feature 브랜치 dispatch 시 해당 브랜치에 데이터 commit. main 외 브랜치는 의도된 운영자만 사용 (AUTOMATION.md §8.1).

concurrency:
  group: data-refresh-tuition-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Universities — v1.0 정책상 --useStatic 필수.
      # v1.0 의 universities.mjs 는 HTML 파싱이 미구현이라 대학 페이지를 fetch 해도 결과는 항상
      # `UNIVERSITY_REGISTRY.staticAnnual` 값. 20도시 × 평균 2~3개 대학 = 50개 이상의 대학 사이트에
      # 매 분기 워크플로우마다 HTTP 요청을 보내는 것은 봇 차단 위험을 키울 뿐 무의미. v1.x 별도
      # phase 에서 --useStatic 제거 + 학교별 selector 도입 예정.
      - name: Refresh Universities (useStatic — v1.0)
        run: node scripts/refresh/_run.mjs universities --useStatic

      - name: Build data
        run: node scripts/build_data.mjs

      - name: Validate cities
        run: node scripts/validate_cities.mjs

      - name: Detect outliers
        id: outliers
        run: node scripts/detect_outliers.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR for outliers
        if: steps.outliers.outputs.HAS_OUTLIERS == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: 'data: quarterly tuition refresh (outliers)'
          branch: auto/refresh-tuition-outlier-${{ github.run_id }}
          title: 'data: quarterly tuition refresh — review needed'
          labels: outlier
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 학비 갱신 중 이상 변동(≥30%) 감지.

            변경 내역을 검토해주세요.

      - name: Create PR for updates
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && (steps.outliers.outputs.HAS_UPDATES == 'true' || steps.outliers.outputs.HAS_NEW == 'true')
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: 'data: quarterly tuition refresh (auto-update)'
          branch: auto/refresh-tuition-update-${{ github.run_id }}
          title: 'data: quarterly tuition refresh (5~30% 변동)'
          labels: auto-update
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 학비 갱신 — 5~30% 변동 또는 데이터 소실(pr-removed) / 신규 항목(HAS_NEW). AUTOMATION.md §1 정책에 따라 PR 로 검토 후 머지.

      - name: Auto commit and push
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && steps.outliers.outputs.HAS_UPDATES != 'true' && steps.outliers.outputs.HAS_NEW != 'true'
        run: |
          git add data/cities/ data/all.json data/seed/all.json
          git diff --staged --quiet || git commit -m "data: quarterly tuition refresh"
          # push retry — 다른 카테고리 워크플로우와의 동시 push race 가 발생해도 다음 시도에서 rebase 후 성공.
          for attempt in 1 2 3; do
            # 이전 attempt 의 rebase 가 충돌로 in-progress 상태로 남아 있으면 다음 시도가 즉시 실패하므로 정리.
            git rebase --abort 2>/dev/null || true
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || echo "::warning::rebase attempt $attempt failed (continuing to push)"
            if git push; then exit 0; fi
            echo "::warning::push attempt $attempt failed; retrying..."
            sleep $((attempt * 15 + RANDOM % 10))  # jitter backoff — 매월 1일 rent + fx 동시 실행 race 완화 (PR #20 review round 19)
          done
          echo "::error::push failed after 3 attempts"
          exit 1
