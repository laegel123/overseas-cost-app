name: Refresh Tuition

on:
  schedule:
    - cron: '0 18 15 1,4,7,10 *' # 분기 첫 달 15일 18:00 KST (= 09:00 UTC)
  workflow_dispatch:

concurrency:
  group: data-refresh-tuition-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Universities - fetch from official university pages
      - name: Refresh Universities
        run: node scripts/refresh/_run.mjs universities

      - name: Build data
        run: node scripts/build_data.mjs

      - name: Validate cities
        run: node scripts/validate_cities.mjs

      - name: Detect outliers
        id: outliers
        run: node scripts/detect_outliers.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR for outliers
        if: steps.outliers.outputs.HAS_OUTLIERS == 'true'
        uses: peter-evans/create-pull-request@v6.1.0
        with:
          commit-message: 'data: quarterly tuition refresh (outliers)'
          branch: auto/refresh-tuition-outlier-${{ github.run_id }}
          title: 'data: quarterly tuition refresh — review needed'
          labels: outlier
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 학비 갱신 중 이상 변동(≥30%) 감지.

            변경 내역을 검토해주세요.

      - name: Create PR for updates
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && steps.outliers.outputs.HAS_UPDATES == 'true'
        uses: peter-evans/create-pull-request@v6.1.0
        with:
          commit-message: 'data: quarterly tuition refresh (auto-update)'
          branch: auto/refresh-tuition-update-${{ github.run_id }}
          title: 'data: quarterly tuition refresh (5~30% 변동)'
          labels: auto-update
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 학비 갱신 — 5~30% 변동. AUTOMATION.md §1 정책에 따라 PR 로 검토 후 머지.

      - name: Auto commit and push
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && steps.outliers.outputs.HAS_UPDATES != 'true'
        run: |
          git add data/cities/ data/all.json data/seed/all.json
          git diff --staged --quiet || git commit -m "data: quarterly tuition refresh"
          git push
