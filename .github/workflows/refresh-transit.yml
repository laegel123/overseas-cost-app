name: Refresh Transit

on:
  schedule:
    - cron: '0 18 1 1,4,7,10 *' # 분기 첫 달 1일 18:00 KST (= 09:00 UTC)
  workflow_dispatch:

concurrency:
  group: data-refresh-transit-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Korea - Seoul Metro (no key required)
      - name: Refresh KR Seoul Metro
        run: node scripts/refresh/_run.mjs kr_seoul_metro

      # Canada - TransLink (no key required)
      - name: Refresh CA TransLink
        run: node scripts/refresh/_run.mjs ca_translink

      # Canada - TTC (no key required)
      - name: Refresh CA TTC
        run: node scripts/refresh/_run.mjs ca_ttc

      # Canada - STM (no key required)
      - name: Refresh CA STM
        run: node scripts/refresh/_run.mjs ca_stm

      # US - Transit (MTA/LA Metro/SFMTA/King County/MBTA)
      - name: Refresh US Transit
        run: node scripts/refresh/_run.mjs us_transit

      # UK - TfL (no key required)
      - name: Refresh UK TfL
        run: node scripts/refresh/_run.mjs uk_tfl

      # Germany - Transit (BVG/MVV)
      - name: Refresh DE Transit
        run: node scripts/refresh/_run.mjs de_transit

      # France - RATP (no key required)
      - name: Refresh FR RATP
        run: node scripts/refresh/_run.mjs fr_ratp

      # Netherlands - GVB (no key required)
      - name: Refresh NL GVB
        run: node scripts/refresh/_run.mjs nl_gvb

      # Australia - Transit (Transport NSW/PTV)
      - name: Refresh AU Transit
        run: node scripts/refresh/_run.mjs au_transit

      # Japan - Transit (Tokyo Metro/Osaka Metro)
      - name: Refresh JP Transit
        run: node scripts/refresh/_run.mjs jp_transit

      # Singapore - LTA (no key required)
      - name: Refresh SG LTA
        run: node scripts/refresh/_run.mjs sg_lta

      # UAE - RTA Dubai (no key required)
      - name: Refresh AE RTA
        run: node scripts/refresh/_run.mjs ae_rta

      - name: Build data
        run: node scripts/build_data.mjs

      - name: Validate cities
        run: node scripts/validate_cities.mjs

      - name: Detect outliers
        id: outliers
        run: node scripts/detect_outliers.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR for outliers
        if: steps.outliers.outputs.HAS_OUTLIERS == 'true'
        uses: peter-evans/create-pull-request@v6.1.0
        with:
          commit-message: 'data: quarterly transit refresh (outliers)'
          branch: auto/refresh-transit-outlier-${{ github.run_id }}
          title: 'data: quarterly transit refresh — review needed'
          labels: outlier
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 교통요금 갱신 중 이상 변동(≥30%) 감지.

            변경 내역을 검토해주세요.

      - name: Create PR for updates
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && steps.outliers.outputs.HAS_UPDATES == 'true'
        uses: peter-evans/create-pull-request@v6.1.0
        with:
          commit-message: 'data: quarterly transit refresh (auto-update)'
          branch: auto/refresh-transit-update-${{ github.run_id }}
          title: 'data: quarterly transit refresh (5~30% 변동)'
          labels: auto-update
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 교통요금 갱신 — 5~30% 변동. AUTOMATION.md §1 정책에 따라 PR 로 검토 후 머지.

      - name: Auto commit and push
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && steps.outliers.outputs.HAS_UPDATES != 'true'
        run: |
          git add data/cities/ data/all.json data/seed/all.json
          git diff --staged --quiet || git commit -m "data: quarterly transit refresh"
          git push
