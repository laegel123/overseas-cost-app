name: Refresh Prices (food + dining)

on:
  schedule:
    - cron: '0 18 * * 1' # 매주 월요일 18:00 KST (= 09:00 UTC)
  workflow_dispatch:

concurrency:
  group: data-refresh-prices-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

# food-only fetcher 만 호출. rent + food 통합형 (uk_ons, de_destatis, fr_insee, nl_cbs,
# au_abs, jp_estat, sg_singstat, vn_gso, ae_fcsc) 은 refresh-rent.yml 로 이전 — 같은 도시를
# 두 워크플로우에서 갱신하면 외부 API 가 2배로 호출되고, 첫 워크플로우 commit 후 두 번째 실행 때
# detect_outliers 가 변동 0 으로 보여 의도치 않은 double refresh 가 추적되지 않는다.

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      KR_DATA_API_KEY: ${{ secrets.KR_DATA_API_KEY }}
      US_BLS_API_KEY: ${{ secrets.US_BLS_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Korea - KCA (Consumer Agency)
      - name: Skip kr_kca if API key absent
        if: env.KR_DATA_API_KEY == ''
        run: echo "::warning::KR_DATA_API_KEY not set, skipping kr_kca.mjs"

      - name: Refresh KR KCA
        if: env.KR_DATA_API_KEY != ''
        run: node scripts/refresh/_run.mjs kr_kca

      # Korea - KOSIS (Statistics)
      - name: Skip kr_kosis if API key absent
        if: env.KR_DATA_API_KEY == ''
        run: echo "::warning::KR_DATA_API_KEY not set, skipping kr_kosis.mjs"

      - name: Refresh KR KOSIS
        if: env.KR_DATA_API_KEY != ''
        run: node scripts/refresh/_run.mjs kr_kosis

      # Canada - StatCan (no key required)
      - name: Refresh CA StatCan
        run: node scripts/refresh/_run.mjs ca_statcan

      # US - BLS
      - name: Skip us_bls if API key absent
        if: env.US_BLS_API_KEY == ''
        run: echo "::warning::US_BLS_API_KEY not set, skipping us_bls.mjs"

      - name: Refresh US BLS
        if: env.US_BLS_API_KEY != ''
        run: node scripts/refresh/_run.mjs us_bls

      # 주의: eu_eurostat 는 default export 가 fallback 데이터만 반환하고 writeCity 를 호출하지 않음
      # (각 국가 fetcher 가 import 해서 보조 자료로 사용하는 라이브러리 모듈) — 워크플로우 단독 호출 금지.
      # _run.mjs 의 LIBRARY_MODULES 가 직접 실행 시 fail-fast 로 차단하지만, 워크플로우 수준에서도
      # 미래 기여자가 실수로 step 을 추가하지 않도록 본 코멘트로 의도를 명시.
      # integration.test.ts 가 어떤 워크플로우에도 eu 라이브러리 모듈 호출 라인이 들어오지 않는지 회귀 검증.

      - name: Build data
        run: node scripts/build_data.mjs

      - name: Validate cities
        run: node scripts/validate_cities.mjs

      - name: Detect outliers
        id: outliers
        run: node scripts/detect_outliers.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR for outliers
        if: steps.outliers.outputs.HAS_OUTLIERS == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: 'data: weekly prices refresh (outliers)'
          branch: auto/refresh-prices-outlier-${{ github.run_id }}
          title: 'data: weekly prices refresh — review needed'
          labels: outlier
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 가격(식재료·외식) 갱신 중 이상 변동(≥30%) 감지.

            변경 내역을 검토해주세요.

      - name: Create PR for updates
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && (steps.outliers.outputs.HAS_UPDATES == 'true' || steps.outliers.outputs.HAS_NEW == 'true')
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: 'data: weekly prices refresh (auto-update)'
          branch: auto/refresh-prices-update-${{ github.run_id }}
          title: 'data: weekly prices refresh (5~30% 변동)'
          labels: auto-update
          add-paths: |
            data/cities/
            data/all.json
            data/seed/all.json
          body: |
            자동 가격(식재료·외식) 갱신 — 5~30% 변동. AUTOMATION.md §1 정책에 따라 PR 로 검토 후 머지.

      - name: Auto commit and push
        if: steps.outliers.outputs.HAS_OUTLIERS != 'true' && steps.outliers.outputs.HAS_UPDATES != 'true' && steps.outliers.outputs.HAS_NEW != 'true'
        run: |
          git add data/cities/ data/all.json data/seed/all.json
          git diff --staged --quiet || git commit -m "data: weekly prices refresh"
          # push retry — 다른 카테고리 워크플로우와의 동시 push race 가 발생해도 다음 시도에서 rebase 후 성공.
          for attempt in 1 2 3; do
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || echo "::warning::rebase attempt $attempt failed (continuing to push)"
            if git push; then exit 0; fi
            echo "::warning::push attempt $attempt failed; retrying..."
            sleep $((attempt * 5))
          done
          echo "::error::push failed after 3 attempts"
          exit 1
