name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    # PR open/reopen/synchronize 시 자동 리뷰
    # 또는 PR 코멘트·리뷰에 @claude 멘션 시 추가 분석
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # 워크어라운드 (anthropics/claude-code-action#1242 / #1260) — v1.0.100+ 의
      # `curl claude.ai/install.sh | bash` 가 silent fail (no pipefail) 하면
      # 액션 안의 SDK 가 `~/.local/bin/claude` 부재로 ReferenceError 로 죽는다.
      # 액션 step 전에 명시적으로 설치 → 이후 액션의 install 재시도가 실패해도
      # 우리 바이너리가 살아남아 SDK 가 정상 동작.
      # #1260 머지 (SDK bundled binary fallback) 후 본 step 제거.
      - name: Pre-install Claude Code (workaround anthropics/claude-code-action#1242)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          # 1차: 공식 install.sh (액션이 쓰는 것과 동일) — 단 strict 에러 처리.
          if curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh \
            && bash /tmp/claude-install.sh \
            && [ -x "$HOME/.local/bin/claude" ]; then
            echo "✓ installed via claude.ai/install.sh"
          else
            echo "install.sh failed; falling back to npm" >&2
            npm install -g @anthropic-ai/claude-code
            CLAUDE_BIN="$(command -v claude || true)"
            if [ -z "$CLAUDE_BIN" ] || [ ! -x "$CLAUDE_BIN" ]; then
              echo "✗ npm fallback also failed to provide claude binary" >&2
              exit 1
            fi
            ln -sf "$CLAUDE_BIN" "$HOME/.local/bin/claude"
            echo "✓ installed via npm + symlink"
          fi
          "$HOME/.local/bin/claude" --version

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 진행 상황·결과를 sticky 코멘트로 PR 에 자동 게시
          track_progress: true
          use_sticky_comment: true
          # 디버깅: Claude SDK 출력 전체 노출
          show_full_output: true
          prompt: |
            이 Pull Request 를 한국어로 리뷰해주세요.

            검토 항목:
            1. **코드 품질·버그·엣지 케이스**
            2. **보안** 우려 (입력 검증, 시크릿 노출, 권한 등)
            3. **성능** 이슈 (불필요한 리렌더, N+1, 큰 번들 등)
            4. **프로젝트 규칙 준수** — `CLAUDE.md` 의 CRITICAL 규칙, `docs/ARCHITECTURE.md`, `docs/UI_GUIDE.md`, `docs/TESTING.md`, `docs/DATA.md`, `docs/ADR.md` 의 결정 사항
            5. **테스트 커버리지** — `docs/TESTING.md` 인벤토리 갱신 여부

            출력 형식:
            - 구체적 이슈는 **인라인 코멘트** 로 해당 라인에 직접
            - 전체 평가는 **요약 코멘트** 1개 (Approve / Request Changes / Comment)
            - 간결하고 건설적으로. 칭찬·문제·개선 제안 균형있게.
